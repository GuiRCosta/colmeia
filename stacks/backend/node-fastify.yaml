name: "Node.js + Fastify"
description: "Backend com Fastify HTTP framework e TypeScript"
category: backend

context: |
  ### Backend
  - Runtime: Node.js + TypeScript
  - Framework HTTP: Fastify
  - Validation: Zod schemas nas rotas
  - Auth: JWT + middleware proprio

  ### Padrao de Codigo Backend — Route -> Controller -> Service -> Repository

  ```
  src/
  ├── routes/          # Registro de rotas + validacao de input (Zod)
  ├── controllers/     # Orquestracao: chama services, monta resposta HTTP
  ├── services/        # Regras de negocio puras, sem HTTP
  ├── repositories/    # Acesso a dados (queries do ORM)
  ├── middlewares/     # Auth, rate limit, error handler
  ├── schemas/         # Schemas Zod compartilhados
  └── types/           # Types/interfaces TypeScript
  ```

commands:
  dev: "npm run dev"
  build: "npm run build"
  lint: "npm run lint"

constraints: |
  - Sempre validar request body com Zod schemas nas definicoes de rota
  - Services NUNCA devem importar tipos do Fastify (logica de negocio pura — Clean Architecture Dependency Rule)
  - Repositories devem retornar objetos de dominio, nao rows crus do DB
  - Structured logging obrigatorio: usar Pino (built-in Fastify) com request context (requestId, userId)
  - Health check endpoints obrigatorios: /health (liveness) e /ready (readiness)
  - Avaliar complexidade de queries: prevenir N+1, usar EXPLAIN ANALYZE para queries > 100ms
  - Exportar metricas Prometheus: request duration (histogram), errors (counter)
