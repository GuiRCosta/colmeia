# ============================================================
# COLMEIA Preset: SaaS com React
# ============================================================
# Stack para SaaS e produtos web modernos.
# Ideal para: SaaS, dashboards, apps com autenticacao
# Agentes: 23 (core + implementation + docs + research + e2e)
# ============================================================

project:
  name: "meu-projeto"
  description: ""

stacks:
  backend:    "node-fastify"
  frontend:   "react-vite"
  database:   "postgresql-drizzle"
  cache:      "redis"
  auth:       "jwt-custom"

agents:
  optional:
    - implementation
    - documentation
    - research
    - e2e
  disabled: []

conventions:
  files_ts:     "kebab-case.ts"
  classes:      "PascalCase"
  functions:    "camelCase"
  constants:    "UPPER_SNAKE_CASE"
  db_tables:    "snake_case (plural)"
  api_routes:   "/kebab-case (plural)"

commands:
  dev:      "npm run dev"
  build:    "npm run build"
  test:     "npm test"
  lint:     "npm run lint"
  db_push:    "npm run db:push"
  db_studio:  "npm run db:studio"
