# ============================================================
# COLMEIA Preset: Minimal
# ============================================================
# Apenas agentes core, sem stacks. Adicione conforme precisar.
# Ideal para: comecar do zero, projetos experimentais, aprendizado
# Agentes: 9 (apenas core)
#
# Depois de instalar, adicione stacks editando project.yaml
# ou rode o agente colmeia-installer para reconfigurar.
# ============================================================

project:
  name: "meu-projeto"
  description: ""

stacks: {}

agents:
  optional: []
  disabled: []

conventions:
  files:        "kebab-case"
  classes:      "PascalCase"
  functions:    "camelCase"
  constants:    "UPPER_SNAKE_CASE"

commands:
  dev:      "npm run dev"
  build:    "npm run build"
  test:     "npm test"
